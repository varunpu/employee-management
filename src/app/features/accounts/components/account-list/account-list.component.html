<h3>Accounts</h3>

<table>

<thead>

<tr>

<th>Account</th>
<th>Type</th>
<th>Balance</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody>

<tr *ngFor="let account of accounts">

<td>
{{account.accountNumber}}
</td>

<td>
{{account.accountType}}
</td>

<td>
{{account.balance}}
</td>

<td>
{{account.status}}
</td>

<td>

<button
(click)="removeAccount(account.id)"
>

Close

</button>

</td>

</tr>

</tbody>

</table>

<div>

Total Balance:
{{subtotal}}

</div>
